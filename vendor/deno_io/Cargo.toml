[package]
name = "deno_io"
version = "0.131.0"
authors = ["Supabase <team@supabase.com>"]
edition = "2024"
license = "MIT"
readme = "README.md"
repository = "https://github.com/supabase/edge-runtime"
description = "IO primitives for Deno extensions"

[lib]
path = "lib.rs"

[dependencies]
async-trait = "0.1.87"
deno_core = "0.363.0"
deno_error = "=0.7.0"
deno_permissions = "0.80.0"
filetime = "0.2.23"
fs3 = "0.5.0"
log = "0.4.28"
once_cell = "1.20.2"
pin-project = "1.0.11"
tokio = { version = "1.36.0", features = ["full"] }
uuid = { version = "1.11.0", features = ["v4"] }

[target.'cfg(not(windows))'.dependencies]
os_pipe = "1.2.1"
libc = "0.2.169"

[target.'cfg(unix)'.dependencies]
nix = { version = "0.29.0", features = ["fs", "user", "socket"] }

[target.'cfg(windows)'.dependencies]
winapi = { version = "=0.3.9", features = ["winbase", "processenv", "errhandlingapi"] }
rand = "0.8.5"
parking_lot = "0.12.3"
windows-sys = { version = "0.59.0", features = ["Win32_Foundation", "Win32_Media", "Win32_Storage_FileSystem"] }
deno_subprocess_windows = "0.16.0"
libc = "0.2.169"
