name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths: &watch
      - '.cargo/**'
      - '.github/workflows/**'
      - 'cli/**'
      - 'crates/**'
      - 'deno/**'
      - 'ext/**'
      - 'vendor/**'
      - '.env'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
  push:
    branches:
      - main
      - develop
      - deno2.5.6
    paths: *watch
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10
  ORT_DYLIB_PATH: /tmp/onnxruntime/lib/libonnxruntime.so
  RUST_LOG: ext_event_worker=trace
  ESZIP_TESTDATA_REPO: supabase/edge-runtime-test-eszip

jobs:
  cargo-fmt:
    if: github.event.pull_request.draft == false
    name: 'fmt'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: rustup show
      #- run: deno run --allow-write --allow-read --allow-run --allow-net ./scripts/format.js --check
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  cargo-clippy:
    if: github.event.pull_request.draft == false
    name: 'cargo clippy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get -y install libblas-dev liblapack-dev libopenblas-dev libglib2.0-dev unzip wget
      - name: Install DuckDB library
        run: |
          wget -O /tmp/libduckdb-linux-amd64.zip https://github.com/duckdb/duckdb/releases/download/v1.4.0/libduckdb-linux-amd64.zip
          unzip /tmp/libduckdb-linux-amd64.zip -d /tmp/duckdb
          sudo cp /tmp/duckdb/libduckdb.so /usr/local/lib/
          sudo cp /tmp/duckdb/duckdb.h /usr/local/include/
          sudo ldconfig
          rm -rf /tmp/libduckdb-linux-amd64.zip /tmp/duckdb
      - run: rustup show
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/clippy.sh

  cargo-test:
    if: github.event.pull_request.draft == false
    name: 'cargo test'
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get -y install libblas-dev liblapack-dev libopenblas-dev libglib2.0-dev unzip wget

      - name: Install DuckDB library
        run: |
          wget -O /tmp/libduckdb-linux-amd64.zip https://github.com/duckdb/duckdb/releases/download/v1.4.0/libduckdb-linux-amd64.zip
          unzip /tmp/libduckdb-linux-amd64.zip -d /tmp/duckdb
          sudo cp /tmp/duckdb/libduckdb.so /usr/local/lib/
          sudo cp /tmp/duckdb/duckdb.h /usr/local/include/
          sudo ldconfig
          rm -rf /tmp/libduckdb-linux-amd64.zip /tmp/duckdb

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Remove unwanted software
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

          sudo apt-get remove --purge -y man-db
          sudo apt-get remove 'clang-13*' 'clang-14*' 'clang-15*' 'llvm-13*' 'llvm-14*' 'llvm-15*' 'lld-13*' 'lld-14*' 'lld-15*'

      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2

      - uses: cardinalby/export-env-action@v2
        with:
          envFile: '.env'

      - name: Install ONNX Runtime Library
        run: ./scripts/install_onnx.sh "${{ env.ONNXRUNTIME_VERSION }}" linux x64 /tmp/onnxruntime

