name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths: &watch
      - 'ext/runtime/edge-runtime/.cargo/**'
      - '.github/workflows/**'
      - 'ext/runtime/edge-runtime/cli/**'
      - 'ext/runtime/edge-runtime/crates/**'
      - 'ext/runtime/edge-runtime/deno/**'
      - 'ext/runtime/edge-runtime/ext/**'
      - 'ext/runtime/edge-runtime/vendor/**'
      - 'ext/runtime/edge-runtime/.env'
      - 'ext/runtime/edge-runtime/Cargo.lock'
      - 'ext/runtime/edge-runtime/Cargo.toml'
      - 'ext/runtime/edge-runtime/rust-toolchain.toml'
  push:
    branches:
      - main
      - develop
      - deno2.5.6
    paths: *watch
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10
  ORT_DYLIB_PATH: /tmp/onnxruntime/lib/libonnxruntime.so
  RUST_LOG: ext_event_worker=trace
  ESZIP_TESTDATA_REPO: supabase/edge-runtime-test-eszip

jobs:
  cargo-fmt:
    if: github.event.pull_request.draft == false
    name: 'fmt'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ext/runtime/edge-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: rustup show
      #- run: deno run --allow-write --allow-read --allow-run --allow-net ./scripts/format.js --check
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  cargo-clippy:
    if: github.event.pull_request.draft == false
    name: 'cargo clippy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ext/runtime/edge-runtime
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get -y install libblas-dev liblapack-dev libopenblas-dev libglib2.0-dev unzip wget
      - name: Install TrexSQL library
        run: |
          wget --tries=3 --retry-connrefused --waitretry=5 -O /tmp/libtrexsql-linux-amd64.zip https://github.com/p-hoffmann/trexsql-rs/releases/download/v1.4.4-trex/libtrexsql-linux-amd64.zip
          unzip /tmp/libtrexsql-linux-amd64.zip -d /tmp/trexsql
          sudo cp /tmp/trexsql/libtrexsql.so /usr/local/lib/
          sudo cp /tmp/trexsql/duckdb.h /usr/local/include/
          sudo ldconfig
          rm -rf /tmp/libtrexsql-linux-amd64.zip /tmp/trexsql
      - run: rustup show
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ext/runtime/edge-runtime
      - run: ./scripts/clippy.sh

  cargo-test:
    if: github.event.pull_request.draft == false
    name: 'cargo test'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ext/runtime/edge-runtime
    steps:
      - name: Start MinIO
        working-directory: .
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done

      - name: Install deps
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get -y install libblas-dev liblapack-dev libopenblas-dev libglib2.0-dev unzip wget

      - name: Install TrexSQL library
        working-directory: .
        run: |
          wget --tries=3 --retry-connrefused --waitretry=5 -O /tmp/libtrexsql-linux-amd64.zip https://github.com/p-hoffmann/trexsql-rs/releases/download/v1.4.4-trex/libtrexsql-linux-amd64.zip
          unzip /tmp/libtrexsql-linux-amd64.zip -d /tmp/trexsql
          sudo cp /tmp/trexsql/libtrexsql.so /usr/local/lib/
          sudo cp /tmp/trexsql/duckdb.h /usr/local/include/
          sudo ldconfig
          rm -rf /tmp/libtrexsql-linux-amd64.zip /tmp/trexsql

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Remove unwanted software
        working-directory: .
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

          sudo apt-get remove --purge -y man-db
          sudo apt-get remove 'clang-13*' 'clang-14*' 'clang-15*' 'llvm-13*' 'llvm-14*' 'llvm-15*' 'lld-13*' 'lld-14*' 'lld-15*'

      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ext/runtime/edge-runtime

      - uses: cardinalby/export-env-action@v2
        with:
          envFile: 'ext/runtime/edge-runtime/.env'

      - name: Install ONNX Runtime Library
        run: ./scripts/install_onnx.sh "${{ env.ONNXRUNTIME_VERSION }}" linux x64 /tmp/onnxruntime

      # - name: Prepare test eszip binaries
      #   if: |
      #     github.actor != 'dependabot[bot]' &&
      #     (
      #       github.event_name != 'pull_request'
      #       || github.event.pull_request.head.repo.full_name == github.repository
      #     )
      #   uses: actions/checkout@v4
      #   with:
      #     repository: ${{ env.ESZIP_TESTDATA_REPO }}
      #     path: ./edge-runtime-test-eszip
      #     token: ${{ secrets.EDGE_RUNTIME_ORG_TOKEN }}
      # - name: Decompress test eszip binaries
      #   if: |
      #     github.actor != 'dependabot[bot]' &&
      #     (
      #       github.event_name != 'pull_request'
      #       || github.event.pull_request.head.repo.full_name == github.repository
      #     )
      #   run: |
      #     mkdir -p crates/base/tests/fixture/testdata
      #     ./scripts/esbr.cjs decompress ./edge-runtime-test-eszip/testdata
      #     mv ./edge-runtime-test-eszip/testdata/*.out crates/base/tests/fixture/testdata

      - name: Create MinIO test bucket
        working-directory: .
        run: |
          wget --tries=3 --retry-connrefused --waitretry=5 -q https://dl.min.io/client/mc/release/linux-amd64/mc -O /tmp/mc
          chmod +x /tmp/mc
          /tmp/mc alias set myminio http://localhost:9000 minioadmin minioadmin
          /tmp/mc mb myminio/testbucket

      - name: Configure S3FS tests (MinIO)
        run: |
          cd crates/fs/tests
          echo "S3FS_TEST_APP_NAME=ci_test" > .env
          echo "S3FS_TEST_BUCKET_NAME=testbucket" >> .env
          echo "S3FS_TEST_ENDPOINT_URL=http://localhost:9000" >> .env
          echo "S3FS_TEST_REGION=us-east-1" >> .env
          echo "S3FS_TEST_ACCESS_KEY_ID=minioadmin" >> .env
          echo "S3FS_TEST_SECRET_ACCESS_KEY=minioadmin" >> .env

      - name: Generate code coverage
        id: coverage
        run: |
          LIBRARY_PATH=/usr/local/lib cargo llvm-cov test --workspace --no-fail-fast --lcov -j 1 --output-path lcov.info \
            --features base/trex \
            --exclude deno_resolver --exclude deno_io --exclude deno_fs --exclude deno_net --exclude deno_npm_installer --exclude deno_telemetry --exclude deno_unsync --exclude trexas
        env:
          LD_LIBRARY_PATH: /usr/local/lib
          ORT_DYLIB_PATH: /tmp/onnxruntime/lib/libonnxruntime.so
      - name: Coveralls upload
        uses: coverallsapp/github-action@v2
        with:
          fail-on-error: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ext/runtime/edge-runtime/lcov.info
          debug: true
